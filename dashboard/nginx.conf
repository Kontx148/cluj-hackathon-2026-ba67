server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Same-origin proxy to gateway-1 (Docker network chainbackend_chain-net).
    # The SPA is built with VITE_GATEWAY_URL=/gw so the browser never hits CORS.
    location /gw/ {
        proxy_pass http://gateway-1:4001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
