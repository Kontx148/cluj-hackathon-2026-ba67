name: Deploy Backend Services

on:
  push:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: false
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy services to DigitalOcean
        uses: appleboy/ssh-action@v1.2.0
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          DEPLOY_BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          envs: GCP_SERVICE_ACCOUNT_JSON,DEPLOY_BRANCH
          script: |
            set -e

            REPO_DIR="/root/cluj-hackathon-2026-ba67"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone "$REPO_URL" "$REPO_DIR"
            fi

            cd "$REPO_DIR"

            git fetch origin "${DEPLOY_BRANCH}"
            git checkout "${DEPLOY_BRANCH}"
            git reset --hard "origin/${DEPLOY_BRANCH}"

            echo "Deployed branch: ${DEPLOY_BRANCH}"

            echo "Deploying ChainBackend..."

            cd "$REPO_DIR/ChainBackend"

            cat > .env << 'EOF'
            ADMIN_API_KEY=${{ secrets.CHAIN_ADMIN_API_KEY }}
            AEP_API_KEY=${{ secrets.CHAIN_AEP_API_KEY }}
            BEC_API_KEY=${{ secrets.CHAIN_BEC_API_KEY }}
            COURT_API_KEY=${{ secrets.CHAIN_COURT_API_KEY }}
            CONSENSUS_THRESHOLD=2
            EOF

            docker compose -p chainbackend down
            docker compose -p chainbackend up --build -d

            docker compose -p chainbackend ps

            echo "Waiting for ChainBackend services..."

            for i in {1..30}; do
              if curl -fsS http://localhost:4001/health; then
                echo "gateway-1 healthy"
                break
              fi

              echo "gateway-1 not ready yet... retry $i/30"
              sleep 2

              if [ "$i" -eq 30 ]; then
                echo "gateway-1 failed"
                docker compose -p chainbackend logs gateway-1 --tail=100
                exit 1
              fi
            done

            for i in {1..30}; do
              if curl -fsS http://localhost:4002/health; then
                echo "gateway-2 healthy"
                break
              fi

              echo "gateway-2 not ready yet... retry $i/30"
              sleep 2

              if [ "$i" -eq 30 ]; then
                echo "gateway-2 failed"
                docker compose -p chainbackend logs gateway-2 --tail=100
                exit 1
              fi
            done

            for i in {1..30}; do
              if curl -fsS http://localhost:4001/validators/status; then
                echo "validators endpoint healthy"
                break
              fi

              echo "validators endpoint not ready yet... retry $i/30"
              sleep 2

              if [ "$i" -eq 30 ]; then
                echo "validators endpoint failed"
                docker compose -p chainbackend logs --tail=150
                exit 1
              fi
            done

            echo "Deploying CivicAI n8n..."

            cd "$REPO_DIR/mobile-app/n8n"

            cat > .env << 'EOF'
            INGEST_API_KEY=${{ secrets.INGEST_API_KEY }}
            GENERIC_TIMEZONE=Europe/Bucharest
            SENAT_FETCH_LIMIT=5
            LLM_PROVIDER=vertex
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            GCP_REGION=europe-west4
            VERTEX_MODEL=gemini-2.5-flash
            GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp-credentials.json
            N8N_HOST=${{ secrets.N8N_HOST }}
            N8N_PROTOCOL=http
            WEBHOOK_URL=${{ secrets.WEBHOOK_URL }}
            N8N_BASIC_AUTH_ACTIVE=true
            N8N_BASIC_AUTH_USER=${{ secrets.N8N_BASIC_AUTH_USER }}
            N8N_BASIC_AUTH_PASSWORD=${{ secrets.N8N_BASIC_AUTH_PASSWORD }}
            N8N_SECURE_COOKIE=false
            EOF

            umask 077
            printf '%s\n' "$GCP_SERVICE_ACCOUNT_JSON" > gcp-service-account.json

            docker compose -p civicai-n8n down
            docker compose -p civicai-n8n up --build -d

            docker compose -p civicai-n8n ps

            echo "Waiting for CivicAI n8n services..."

            for i in {1..30}; do
              if curl -fsS http://localhost:5678; then
                echo "n8n healthy"
                break
              fi

              echo "n8n not ready yet... retry $i/30"
              sleep 2

              if [ "$i" -eq 30 ]; then
                echo "n8n failed"
                docker compose -p civicai-n8n logs --tail=150
                exit 1
              fi
            done

            echo "Importing n8n workflows..."

            if [ -d "$REPO_DIR/mobile-app/n8n/workflows" ]; then
              docker compose -p civicai-n8n exec -T n8n n8n import:workflow --separate --input=/workflows || true
              docker compose -p civicai-n8n restart n8n
            else
              echo "No workflows folder found, skipping workflow import."
            fi

            echo "Checking feed-api..."

            if curl -fsS http://localhost:3001/api/health; then
              echo "feed-api healthy"
            else
              echo "feed-api /api/health failed"
              docker compose -p civicai-n8n logs feed-api --tail=100
              exit 1
            fi

            if curl -fsS http://localhost:3001/api/health/llm; then
              echo "Vertex AI healthy"
            else
              echo "feed-api /api/health/llm failed — check GCP_PROJECT_ID and GCP_SERVICE_ACCOUNT_JSON secrets"
              docker compose -p civicai-n8n logs feed-api --tail=100
              exit 1
            fi

            echo "Deployment finished."
