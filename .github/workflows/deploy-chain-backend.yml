name: Deploy Backend & Dashboard

on:
  push:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: false
        default: main
      import_n8n_workflows:
        description: Force re-import n8n workflows from repo JSON (overwrites matching workflow IDs)
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy services to DigitalOcean
        uses: appleboy/ssh-action@v1.2.0
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          DEPLOY_BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
          FORCE_IMPORT_WORKFLOWS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.import_n8n_workflows == true && 'true' || 'false' }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          envs: GCP_SERVICE_ACCOUNT_JSON,DEPLOY_BRANCH,FORCE_IMPORT_WORKFLOWS
          script: |
            set -e

            REPO_DIR="/root/cluj-hackathon-2026-ba67"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone "$REPO_URL" "$REPO_DIR"
            fi

            cd "$REPO_DIR"

            PREV_HEAD=$(git rev-parse HEAD)

            git fetch origin "${DEPLOY_BRANCH}"
            git checkout "${DEPLOY_BRANCH}"
            git reset --hard "origin/${DEPLOY_BRANCH}"

            NEW_HEAD=$(git rev-parse HEAD)

            echo "Deployed branch: ${DEPLOY_BRANCH} (${PREV_HEAD:0:7} -> ${NEW_HEAD:0:7})"

            echo "Deploying ChainBackend..."

            cd "$REPO_DIR/ChainBackend"

            cat > .env << 'EOF'
            ADMIN_API_KEY=${{ secrets.CHAIN_ADMIN_API_KEY }}
            AEP_API_KEY=${{ secrets.CHAIN_AEP_API_KEY }}
            BEC_API_KEY=${{ secrets.CHAIN_BEC_API_KEY }}
            COURT_API_KEY=${{ secrets.CHAIN_COURT_API_KEY }}
            CONSENSUS_THRESHOLD=2
            DASHBOARD_PUBLIC_HOST=${{ secrets.DO_HOST }}
            EOF

            if [ ! -f "$REPO_DIR/dashboard/package.json" ]; then
              echo "ERROR: dashboard/ is missing from the repo checkout."
              ls -la "$REPO_DIR"
              exit 1
            fi

            docker compose -p chainbackend down
            docker compose -p chainbackend up --build -d

            docker compose -p chainbackend ps

            echo "Waiting for ChainBackend services..."

            for i in {1..30}; do
              if curl -fsS http://localhost:4001/health; then
                echo "gateway-1 healthy"
                break
              fi

              echo "gateway-1 not ready yet... retry $i/30"
              sleep 2

              if [ "$i" -eq 30 ]; then
                echo "gateway-1 failed"
                docker compose -p chainbackend logs gateway-1 --tail=100
                exit 1
              fi
            done

            for i in {1..30}; do
              if curl -fsS http://localhost:4002/health; then
                echo "gateway-2 healthy"
                break
              fi

              echo "gateway-2 not ready yet... retry $i/30"
              sleep 2

              if [ "$i" -eq 30 ]; then
                echo "gateway-2 failed"
                docker compose -p chainbackend logs gateway-2 --tail=100
                exit 1
              fi
            done

            for i in {1..30}; do
              if curl -fsS http://localhost:4001/validators/status; then
                echo "validators endpoint healthy"
                break
              fi

              echo "validators endpoint not ready yet... retry $i/30"
              sleep 2

              if [ "$i" -eq 30 ]; then
                echo "validators endpoint failed"
                docker compose -p chainbackend logs --tail=150
                exit 1
              fi
            done

            echo "Waiting for operations dashboard..."

            for i in {1..60}; do
              if curl -fsS http://localhost:5173/ >/dev/null; then
                echo "dashboard healthy"
                break
              fi

              echo "dashboard not ready yet... retry $i/60"
              sleep 3

              if [ "$i" -eq 60 ]; then
                echo "dashboard failed"
                docker compose -p chainbackend logs dashboard --tail=100
                exit 1
              fi
            done

            echo "Deploying CivicAI n8n..."

            cd "$REPO_DIR/mobile-app/n8n"

            cat > .env << 'EOF'
            INGEST_API_KEY=${{ secrets.INGEST_API_KEY }}
            GENERIC_TIMEZONE=Europe/Bucharest
            SENAT_FETCH_LIMIT=20
            LLM_PROVIDER=vertex
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            GCP_REGION=europe-west4
            VERTEX_MODEL=gemini-2.5-flash
            GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp-credentials.json
            N8N_HOST=${{ secrets.N8N_HOST }}
            N8N_PROTOCOL=http
            WEBHOOK_URL=${{ secrets.WEBHOOK_URL }}
            N8N_BASIC_AUTH_ACTIVE=true
            N8N_BASIC_AUTH_USER=${{ secrets.N8N_BASIC_AUTH_USER }}
            N8N_BASIC_AUTH_PASSWORD=${{ secrets.N8N_BASIC_AUTH_PASSWORD }}
            N8N_SECURE_COOKIE=false
            EOF

            umask 077
            printf '%s\n' "$GCP_SERVICE_ACCOUNT_JSON" > gcp-service-account.json

            docker compose -p civicai-n8n down
            docker compose -p civicai-n8n up --build -d

            docker compose -p civicai-n8n ps

            echo "Waiting for CivicAI n8n services..."

            for i in {1..45}; do
              code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5678/ || true)
              if [ "$code" = "200" ] || [ "$code" = "401" ] || [ "$code" = "302" ]; then
                echo "n8n healthy (HTTP $code)"
                break
              fi

              echo "n8n not ready yet... retry $i/45 (HTTP $code)"
              sleep 3

              if [ "$i" -eq 45 ]; then
                echo "n8n failed"
                docker compose -p civicai-n8n logs --tail=150
                exit 1
              fi
            done

            echo "Checking n8n workflow import..."

            SHOULD_IMPORT=false
            if [ "$FORCE_IMPORT_WORKFLOWS" = "true" ]; then
              SHOULD_IMPORT=true
              echo "Force-import enabled (workflow_dispatch)."
            else
              echo "Skipping n8n import on push deploy (use workflow_dispatch + Import n8n workflows to sync JSON)."
            fi

            SENAT_WF="$REPO_DIR/mobile-app/n8n/workflows/civicai-senat-romania.json"
            if [ "$SHOULD_IMPORT" = "true" ] && [ -f "$SENAT_WF" ]; then
              if ! grep -q 'simplify/records' "$SENAT_WF"; then
                echo "ERROR: civicai-senat-romania.json on branch ${DEPLOY_BRANCH} has no Vertex simplify step."
                echo "Merge the feature branch (or update main) before importing workflows."
                exit 1
              fi
              echo "Senat workflow OK (contains /api/simplify/records)."
            fi

            if [ "$SHOULD_IMPORT" = "true" ] && [ -d "$REPO_DIR/mobile-app/n8n/workflows" ]; then
              echo "Importing n8n workflows from repo (branch ${DEPLOY_BRANCH})..."
              docker compose -p civicai-n8n exec -T n8n n8n import:workflow --separate --input=/workflows
              docker compose -p civicai-n8n restart n8n
              echo "n8n workflows imported."
            fi

            echo "Checking feed-api..."

            if curl -fsS http://localhost:3001/api/health; then
              echo "feed-api healthy"
            else
              echo "feed-api /api/health failed"
              docker compose -p civicai-n8n logs feed-api --tail=100
              exit 1
            fi

            if curl -fsS http://localhost:3001/api/health/llm; then
              echo "Vertex AI healthy"
            else
              echo "feed-api /api/health/llm failed — check GCP_PROJECT_ID and GCP_SERVICE_ACCOUNT_JSON secrets"
              docker compose -p civicai-n8n logs feed-api --tail=100
              exit 1
            fi

            DO_PUBLIC_HOST="${{ secrets.DO_HOST }}"

            echo "Deployment finished."
            echo "Dashboard: http://${DO_PUBLIC_HOST}:5173/"
            echo "Gateway 1: http://${DO_PUBLIC_HOST}:4001/health"
            echo "Gateway 2: http://${DO_PUBLIC_HOST}:4002/health"
            echo "n8n:       http://${DO_PUBLIC_HOST}:5678/"
            echo "Feed API:  http://${DO_PUBLIC_HOST}:3001/api/health"
