name: Deploy backend (n8n + feed-api)

on:
  push:
    paths:
      - "mobile-app/n8n/**"
      - "mobile-app/tools/feed-api/**"
      - "mobile-app/data/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy on VPS
        required: false
        default: main

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          N8N_DOTENV: ${{ secrets.N8N_DOTENV }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          DEPLOY_PATH: ${{ secrets.DO_DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          envs: N8N_DOTENV,GCP_SERVICE_ACCOUNT_JSON,DEPLOY_PATH,DEPLOY_BRANCH
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/opt/civicai}"
            git fetch origin "${DEPLOY_BRANCH}"
            git checkout "${DEPLOY_BRANCH}"
            git reset --hard "origin/${DEPLOY_BRANCH}"
            cd mobile-app/n8n
            umask 077
            printf '%s\n' "$N8N_DOTENV" > .env
            printf '%s\n' "$GCP_SERVICE_ACCOUNT_JSON" > gcp-service-account.json
            docker compose pull
            docker compose up -d
            echo "Waiting for feed-api..."
            sleep 12
            curl -sf http://localhost:3001/api/health
            curl -sf http://localhost:3001/api/health/llm
            echo "Deploy OK on branch ${DEPLOY_BRANCH}"
