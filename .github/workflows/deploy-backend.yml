name: Deploy backend (n8n + feed-api)

on:
  push:
    paths:
      - "mobile-app/n8n/**"
      - "mobile-app/tools/feed-api/**"
      - "mobile-app/data/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          N8N_DOTENV: ${{ secrets.N8N_DOTENV }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: N8N_DOTENV,GCP_SERVICE_ACCOUNT_JSON,DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/opt/civicai}"
            git fetch origin main
            git reset --hard origin/main
            cd mobile-app/n8n
            umask 077
            printf '%s\n' "$N8N_DOTENV" > .env
            printf '%s\n' "$GCP_SERVICE_ACCOUNT_JSON" > gcp-service-account.json
            docker compose pull
            docker compose up -d
            echo "Waiting for feed-api..."
            sleep 12
            curl -sf http://localhost:3001/api/health
            curl -sf http://localhost:3001/api/health/llm
            echo "Deploy OK"
