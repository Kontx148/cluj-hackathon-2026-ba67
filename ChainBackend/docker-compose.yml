version: "3.9"

services:
  validator-1:
    build:
      context: ./validator
    container_name: validator-1
    restart: unless-stopped
    environment:
      PORT: 4101
      VALIDATOR_ID: validator-1
      VALIDATOR_PRIVATE_KEY: mock-validator-1-key
    ports:
      - "4101:4101"
    networks:
      - chain-net

  validator-2:
    build:
      context: ./validator
    container_name: validator-2
    restart: unless-stopped
    environment:
      PORT: 4102
      VALIDATOR_ID: validator-2
      VALIDATOR_PRIVATE_KEY: mock-validator-2-key
    ports:
      - "4102:4102"
    networks:
      - chain-net

  chain-backend:
    build:
      context: ./chain-backend
    container_name: chain-backend
    restart: unless-stopped
    depends_on:
      - validator-1
      - validator-2
    environment:
      PORT: 4000
      NODE_ENV: development
      VALIDATOR_1_URL: http://validator-1:4101
      VALIDATOR_2_URL: http://validator-2:4102
      CONSENSUS_THRESHOLD: 2
      CHAIN_STORAGE_MODE: file
      CHAIN_STORAGE_PATH: /data/chain.json
      ADMIN_API_KEY: dev-admin-key
      AEP_API_KEY: dev-aep-key
      BEC_API_KEY: dev-bec-key
      COURT_API_KEY: dev-court-key
    ports:
      - "4000:4000"
    volumes:
      - chain-data:/data
    networks:
      - chain-net

networks:
  chain-net:
    driver: bridge

volumes:
  chain-data:
