name: votera
description: Votera — secure blockchain-based voting + civic feed
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  url_launcher: ^6.2.5
  pointycastle: ^4.0.0
  basic_utils: ^5.8.2
  hugeicons: ^1.1.7
  shared_preferences: ^2.5.3
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - data/news-items.json
    - data/law-items.json
